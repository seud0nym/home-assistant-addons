name: "Sigenergy Modbus Simulator"
description: >-
  Modbus TCP simulator for SigenStor/Sigenergy inverters.
  Runs the modbus_test_server from the sigenergy2mqtt project on port 502,
  allowing you to test sigenergy2mqtt without a physical inverter.
version: "2026.4.9a1"
slug: "sigenergy-modbus-simulator"
url: "https://github.com/seud0nym/sigenergy2mqtt"
init: true

arch:
  - aarch64
  - amd64

ports:
  502/tcp: 502
ports_description:
  502/tcp: "Modbus TCP (simulator)"

map: []

options:
  log_level: "INFO"
  simulate_grid_outages: false
  simulate_firmware_upgrade: false
  simulate_power_factor_errors: false
  use_simplified_topics: false
  mqtt_broker: ""
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_log_level: "WARNING"
  modbus_host: ""
  modbus_port: 502
 
schema:
  log_level: "list(DEBUG|INFO|WARNING|ERROR|CRITICAL|Default)"
  initial_firmware: "str?"
  upgrade_firmware: "str?"
  protocol_version: "float(1.8,)?"
  registers_to_debug: "str?"
  simulate_grid_outages: "bool"
  simulate_firmware_upgrade: "bool"
  simulate_power_factor_errors: "bool"
  use_simplified_topics: "bool"
  mqtt_broker: "str?"
  mqtt_port: "port?"
  mqtt_username: "str?"
  mqtt_password: "password?"
  mqtt_log_level: "list(DEBUG|INFO|WARNING|ERROR|CRITICAL|Default)?"
  modbus_host: "str?"
  modbus_port: "port?"