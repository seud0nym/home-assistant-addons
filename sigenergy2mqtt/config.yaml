# https://developers.home-assistant.io/docs/apps/configuration#app-config
arch:
  - aarch64
  - amd64
description: Publish Modbus data from Sigenergy to an MQTT Broker, with optional PVOutput updating
homeassistant_api: true
host_network: true
image: "ghcr.io/seud0nym/home-assistant-addon-sigenergy2mqtt"
init: false
map:
  - addon_config
name: sigenergy2mqtt
options:
  auto_discovery: {
    force: false,
  }
  manual_config: {
    host: "",
    inverter_device_id: "",
    accharger_device_id: "",
    dccharger_device_id: "",
  }
  scan_interval: {}
  pvoutput: {
    enabled: false,
    api_key: "",
    system_id: "",
    consumption: false,
    exports: true,
    imports: true,
    eod_update: true,
    voltage: "Line to Neutral Average",
  }
  mqtt: {}
  advanced: {
    clean: false,
    read_only: false,
    no_remote_ems: false,
    no_ems_mode_check: false,
    edit_pct_box: false,
    sigenergy_local_modbus_naming: false,
    metrics_enabled: false,
    envvars: []
  }
  influxdb: 
    enabled: false
    host: "a0d7b954-influxdb"
    include: []
    exclude: []
  logging: {}
schema:
  auto_discovery:
    force: "bool"
    ping_timeout: "float(0.5,)?"
    timeout: "float(0.25,)?"
    retries: "int(0,)?"
  manual_config:
    host: "str?"
    port: "port?"
    inverter_device_id: "match(^[0-9 ,]*$)?"
    accharger_device_id: "match(^[0-9 ,]*$)?"
    dccharger_device_id: "match(^[0-9 ,]*$)?"
  scan_interval:
    low: "int(1,)?"
    medium: "int(1,)?"
    high: "int(1,)?"
    realtime: "int(1,)?"
  pvoutput:
    enabled: "bool"
    api_key: "str?"
    system_id: "str?"
    consumption: "bool"
    exports: "bool"
    imports: "bool"
    eod_update: "bool"
    voltage: "list(Phase A|Phase B|Phase C|Line to Neutral Average|Line to Line Average|PV Average)"
    ext_v7: "str?"
    ext_v8: "str?"
    ext_v9: "str?"
    ext_v10: "str?"
    ext_v11: "str?"
    ext_v12: "str?"
    temp_topic: "str?"
  mqtt:
    broker: "str?"
    port: "port?"
    tls: "bool?"
    username: "str?"
    password: "password?"
  advanced:
    clean: "bool"
    read_only: "bool"
    no_remote_ems: "bool"
    no_ems_mode_check: "bool"
    edit_pct_box: "bool"
    sigenergy_local_modbus_naming: "bool"
    metrics_enabled: "bool"
    consumption_method: "list(Calculated|Total Load|General Load)?"
    sanity_check_default_kw: "int(1,)?"
    language: "list(Deutsch|English|Español|Français|Italiano|日本語|한국어|Nederlands|Português|中文|Default)?"
    envvars:
      - name: match(^SIGENERGY2MQTT_([A-Z0-9_])+$)
        value: str
  influxdb:
    enabled: "bool"
    host: "str?"
    port: "port?"
    username: "str?"
    password: "password?"
    database: "str?"
    org: "str?"
    token: "str?"
    bucket: "str?"
    include:
      - sensor: "str?"
    exclude:
      - sensor: "str?"
  logging:
    sigenergy2mqtt: "list(DEBUG|INFO|WARNING|ERROR|CRITICAL|Default)?"
    debug_sensor: "str?"
    app: "list(ALL|TRACE|DEBUG|INFO|NOTICE|WARNING|ERROR|CRITICAL|OFF|Default)?"
    modbus: "list(DEBUG|INFO|WARNING|ERROR|CRITICAL|Default)?"
    pvoutput: "list(DEBUG|INFO|WARNING|ERROR|CRITICAL|Default)?"
    mqtt: "list(DEBUG|INFO|WARNING|ERROR|CRITICAL|Default)?"
    influxdb: "list(DEBUG|INFO|WARNING|ERROR|CRITICAL|Default)?"
  #region  Deprecated options left in for backward compatibility. The run script will migrate them to their replacements if found.
  consumption_method: "list(Calculated|Total Load|General Load)?"
  debug_sensor: "str?"
  device_name_prefix: "str?"
  discovery_prefix: "str?"
  edit_pct_box: "bool?"
  entity_id_prefix: "str?"
  log_level: "list(DEBUG|INFO|WARNING|ERROR|CRITICAL)?"
  metrics_enabled: "bool?"
  modbus_accharger_slave: "match(^[0-9 ,]*$)?"
  modbus_auto_discovery_ping_timeout: "float(0.5,)?"
  modbus_auto_discovery_retries: "int(0,)?"
  modbus_auto_discovery_timeout: "float(0.25,)?"
  modbus_dccharger_slave: "match(^[0-9 ,]*$)?"
  modbus_force_auto_discovery: "bool?"
  modbus_host: "str?"
  modbus_log_level: "list(DEBUG|INFO|WARNING|ERROR|CRITICAL)?"
  modbus_no_remote_ems: "bool?"
  modbus_port: "port?"
  modbus_read_only: "bool?"
  modbus_slave: "match(^[0-9 ,]*$)?"
  mqtt_broker: "str?"
  mqtt_log_level: "list(DEBUG|INFO|WARNING|ERROR|CRITICAL)?"
  mqtt_password: "password?"
  mqtt_port: "port?"
  mqtt_tls: "bool?"
  mqtt_username: "str?"
  no_ems_mode_check: "bool?"
  pvoutput_api_key: "str?"
  pvoutput_consumption: "bool?"
  pvoutput_enabled: "bool?"
  pvoutput_eod_update: "bool?"
  pvoutput_exports: "bool?"
  pvoutput_ext_v10: "str?"
  pvoutput_ext_v11: "str?"
  pvoutput_ext_v12: "str?"
  pvoutput_ext_v7: "str?"
  pvoutput_ext_v8: "str?"
  pvoutput_ext_v9: "str?"
  pvoutput_imports: "bool?"
  pvoutput_log_level: "list(DEBUG|INFO|WARNING|ERROR|CRITICAL)?"
  pvoutput_system_id: "str?"
  pvoutput_temp_topic: "str?"
  pvoutput_voltage: "list(Phase A|Phase B|Phase C|Line to Neutral Average|Line to Line Average|PV Average)?"
  sanity_check_default_kw: "int(1,)?"
  scan_interval_high: "int(1,)?"
  scan_interval_low: "int(1,)?"
  scan_interval_medium: "int(1,)?"
  scan_interval_realtime: "int(1,)?"
  smartport_enabled: "bool?"
  smartport_host: "str?"
  smartport_module_name: "str?"
  smartport_mqtt_gain: "int?"
  smartport_mqtt_topic: "str?"
  smartport_password: "password?"
  smartport_pv_power: "str?"
  smartport_username: "str?"
  unique_id_prefix: "str?"
  #endregion
services:
  - "mqtt:want"
slug: sigenergy2mqtt
url: "https://github.com/seud0nym/home-assistant-addons/tree/alpha/sigenergy2mqtt"
version: "2026.4.16"
stage: experimental
