configuration:
  auto_discovery:
    name: Sigenergy 기기 자동 검색
    description: Sigenergy 기기를 자동으로 검색하기 위한 설정
    fields:
      force:
        name: 자동 검색 강제
        description: Sigenergy Modbus 호스트 및 관련 기기 ID의 자동 검색을 강제하려면 활성화하세요.
      ping_timeout:
        name: Ping 타임아웃
        description: 자동 검색 시 Ping 타임아웃(초). 기본값 0.5초.
      retries:
        name: 최대 재시도 횟수
        description: 자동 검색 시 최대 재시도 횟수. 기본값 0.
      timeout:
        name: Modbus 타임아웃
        description: 자동 검색 시 Modbus 타임아웃(초). 기본값 0.25초.
  manual_config:
    name: Sigenergy 기기 수동 설정
    description: 연결 세부 정보를 수동으로 지정하기 위한 설정
    fields:
      host:
        name: 호스트 주소
        description: Sigenergy 기기의 호스트 이름 또는 IP 주소. 자동 검색을 위해 비워두세요.
      port:
        name: Modbus 포트
        description: Sigenergy 기기의 Modbus 포트 번호.
      inverter_device_id:
        name: 인버터 기기 ID
        description: Sigenergy 인버터 Modbus 기기 ID. 여러 인버터의 경우 공백으로 구분된 목록을 사용하세요.
      accharger_device_id:
        name: AC 충전기 기기 ID
        description: Sigenergy AC 충전기 Modbus 기기 ID.
      dccharger_device_id:
        name: DC 충전기 기기 ID
        description: Sigenergy DC 충전기 Modbus 기기 ID (보통 인버터 ID와 동일).
  scan_interval:
    name: 센서 스캔 간격
    description: 다양한 센서 클래스의 스캔 간격 설정
    fields:
      low:
        name: 저빈도
        description: 저빈도 센서의 스캔 간격(초). 기본값 600, 최소값 1.
      medium:
        name: 중빈도
        description: 중빈도 센서의 스캔 간격(초). 기본값 60, 최소값 1.
      high:
        name: 고빈도
        description: 고빈도 센서의 스캔 간격(초). 기본값 10, 최소값 1.
      realtime:
        name: 거의 실시간
        description: 실시간 센서의 스캔 간격(초). 기본값 5, 최소값 1.
  pvoutput:
    name: PVOutput.org 통합
    description: PVOutput.org와의 통합 설정
    fields:
      enabled:
        name: 업로드 활성화
        description: PVOutput으로 상태 업데이트 활성화.
      api_key:
        name: API 키
        description: PVOutput용 API 키
      system_id:
        name: 시스템 ID
        description: PVOutput 시스템 ID
      consumption:
        name: 소비량 업로드 활성화
        description: PVOutput에 소비 상태 전송.
      exports:
        name: 내보내기 업로드 활성화
        description: PVOutput에 내보내기 데이터 전송.
      imports:
        name: 가져오기 업로드 활성화
        description: PVOutput에 가져오기 데이터 전송.
      eod_update:
        name: 일말 업로드 활성화
        description: 일말에 피크 발전량과 일일 합계 전송.
      voltage:
        name: 전압 소스
        description: PVOutput에 전송할 전압 값의 소스. 단상은 'Phase A', 삼상은 'Phase B/C' 또는 'Line to Line Average'.
      ext_v7:
        name: 확장 데이터 v7
        description: PVOutput의 v7 확장 필드를 채우는 데 사용되는 소스입니다. 센서 클래스 이름, 'sensor.' 접두사가 없는 엔티티 ID, 직접 MQTT 토픽(또는 mqtt:<topic>) 또는 Home Assistant 센서 엔티티 ID(sensor.<id> 또는 ha:sensor.<id>)를 지정할 수 있습니다. 지정하지 않았거나 기부 상태가 최신이 아닌 경우 이 필드는 PVOutput으로 전송되지 않습니다.
      ext_v8:
        name: 확장 데이터 v8
        description: PVOutput의 v8 확장 필드를 채우는 데 사용되는 소스입니다. 센서 클래스 이름, 'sensor.' 접두사가 없는 엔티티 ID, 직접 MQTT 토픽(또는 mqtt:<topic>) 또는 Home Assistant 센서 엔티티 ID(sensor.<id> 또는 ha:sensor.<id>)를 지정할 수 있습니다. 지정하지 않았거나 기부 상태가 최신이 아닌 경우 이 필드는 PVOutput으로 전송되지 않습니다.
      ext_v9:
        name: 확장 데이터 v9
        description: PVOutput의 v9 확장 필드를 채우는 데 사용되는 소스입니다. 센서 클래스 이름, 'sensor.' 접두사가 없는 엔티티 ID, 직접 MQTT 토픽(또는 mqtt:<topic>) 또는 Home Assistant 센서 엔티티 ID(sensor.<id> 또는 ha:sensor.<id>)를 지정할 수 있습니다. 지정하지 않았거나 기부 상태가 최신이 아닌 경우 이 필드는 PVOutput으로 전송되지 않습니다.
      ext_v10:
        name: 확장 데이터 v10
        description: PVOutput의 v10 확장 필드를 채우는 데 사용되는 소스입니다. 센서 클래스 이름, 'sensor.' 접두사가 없는 엔티티 ID, 직접 MQTT 토픽(또는 mqtt:<topic>) 또는 Home Assistant 센서 엔티티 ID(sensor.<id> 또는 ha:sensor.<id>)를 지정할 수 있습니다. 지정하지 않았거나 기부 상태가 최신이 아닌 경우 이 필드는 PVOutput으로 전송되지 않습니다.
      ext_v11:
        name: 확장 데이터 v11
        description: PVOutput의 v11 확장 필드를 채우는 데 사용되는 소스입니다. 센서 클래스 이름, 'sensor.' 접두사가 없는 엔티티 ID, 직접 MQTT 토픽(또는 mqtt:<topic>) 또는 Home Assistant 센서 엔티티 ID(sensor.<id> 또는 ha:sensor.<id>)를 지정할 수 있습니다. 지정하지 않았거나 기부 상태가 최신이 아닌 경우 이 필드는 PVOutput으로 전송되지 않습니다.
      ext_v12:
        name: 확장 데이터 v12
        description: PVOutput의 v12 확장 필드를 채우는 데 사용되는 소스입니다. 센서 클래스 이름, 'sensor.' 접두사가 없는 엔티티 ID, 직접 MQTT 토픽(또는 mqtt:<topic>) 또는 Home Assistant 센서 엔티티 ID(sensor.<id> 또는 ha:sensor.<id>)를 지정할 수 있습니다. 지정하지 않았거나 기부 상태가 최신이 아닌 경우 이 필드는 PVOutput으로 전송되지 않습니다.
      temp_topic:
        name: 온도
        description: PVOutput으로 전송되는 현재 온도의 소스입니다. 직접 MQTT 토픽(또는 mqtt:<topic>) 또는 Home Assistant 센서 엔티티 ID(sensor.<id> 또는 ha:sensor.<id>)를 지정할 수 있습니다. 지정하지 않으면 온도가 PVOutput으로 전송되지 않습니다.
  mqtt:
    name: MQTT 설정
    description: MQTT 브로커 연결 설정
    fields:
      broker:
        name: 브로커 주소
        description: MQTT 브로커의 호스트 이름 또는 IP 주소.
      port:
        name: MQTT 포트
        description: MQTT 브로커의 리스닝 포트. 기본값 1883, TLS 사용 시 8883.
      tls:
        name: TLS 통신 활성화
        description: TLS/SSL을 통한 보안 통신 활성화.
      username:
        name: 사용자 이름
        description: MQTT 브로커의 사용자 이름.
      password:
        name: 비밀번호
        description: MQTT 브로커의 비밀번호.
  advanced:
    name: 고급 설정
    description: sigenergy2mqtt의 고급 설정
    fields:
      clean:
        name: MQTT 보관 메시지 정리
        description: MQTT 보관 메시지를 정리합니다. **주의!** Home Assistant 헬퍼가 제거됩니다.
      consumption_method:
        name: 소비량 계산 방식
        description: "'Plant Consumed Power' 계산 방식. V2.8의 경우 기본값 'Total Load'."
      read_only:
        name: 읽기 전용 활성화
        description: 데이터 읽기만 하고 쓰기는 하지 않습니다.
      no_remote_ems:
        name: 원격 EMS 비활성화
        description: 원격 EMS용 읽기/쓰기 센서 숨기기.
      no_ems_mode_check:
        name: 원격 EMS 검사 비활성화
        description: ESS 제한 검증 비활성화.
      edit_pct_box:
        name: 퍼센트 박스 편집기 활성화
        description: 퍼센트 센서에 슬라이더 대신 숫자 입력 박스 사용.
      sigenergy_local_modbus_naming:
        name: Sigenergy-Local-Modbus 명명
        description: 센서에 TypQxQ/Sigenergy-Local-Modbus 엔티티 명명 규칙을 사용하려면 활성화하세요. (이 옵션을 변경할 때 MQTT 메시지 정리도 활성화해야 합니다. 그렇지 않으면 새 엔티티 이름이 Home Assistant에서 무시됩니다.)
      metrics_enabled:
        name: 메트릭 활성화
        description: sigenergy2mqtt 메트릭 게시.
      sanity_check_default_kw:
        name: 검증용 기본 kW
        description: 검증용 기본값(kW). 기본값 500 kW.
      language:
        name: 언어
        description: sigenergy2mqtt에 사용할 언어입니다. 기본값은 설정 → 시스템 → 언어에 정의된 값이며, 해당 언어가 지원되지 않는 경우 기본값은 영어입니다.
      envvars:
        name: 환경 변수
        description: sigenergy2mqtt 서비스에 대한 고급 환경 변수를 구성할 수 있습니다. 사용 가능한 환경 변수의 전체 목록은 https://github.com/seud0nym/sigenergy2mqtt/blob/main/resources/configuration/ENV.md#environment-variables 에서 확인할 수 있습니다.
        fields:
          name:
            name: 이름
            description: 환경 변수의 이름입니다.
          value:
            name: 값
            description: 환경 변수의 값입니다.
  logging:
    name: 로깅 설정
    description: 로깅 레벨 설정
    fields:
      sigenergy2mqtt:
        name: sigenergy2mqtt
        description: sigenergy2mqtt 로깅 레벨 설정.
      debug_sensor:
        name: 디버그할 센서
        description: 디버그할 센서 지정.
      app:
        name: 애드온 실행 스크립트
        description: 애드온 스크립트의 로깅 레벨.
      modbus:
        name: Modbus
        description: pymodbus 로깅 레벨.
      pvoutput:
        name: PVOutput
        description: PVOutput 로깅 레벨.
      mqtt:
        name: MQTT
        description: paho.mqtt 로깅 레벨.
      influxdb:
        name: InfluxDB
        description: InfluxDB 로깅 레벨.
  influxdb:
    name: InfluxDB 설정
    description: 센서 데이터를 InfluxDB 데이터베이스에 기록하기 위한 설정. (이것은 활성화된 센서만 게시하고 반복 데이터를 게시하지 않는 Home Assistant의 InfluxDB 통합과 다릅니다.)
    fields:
      enabled:
        name: InfluxDB 활성화
        description: InfluxDB로 센서 데이터 게시를 활성화합니다.
      host:
        name: 호스트
        description: InfluxDB 데이터베이스의 호스트 이름 또는 IP 주소. 기본값은 'a0d7b954-influxdb' (InfluxDB Home Assistant 애드온의 호스트 이름).
      port:
        name: 포트
        description: InfluxDB 데이터베이스의 리스닝 포트. 기본값은 8086.
      username:
        name: 사용자 이름
        description: InfluxDB 데이터베이스의 유효한 사용자 이름.
      password:
        name: 비밀번호
        description: InfluxDB 데이터베이스 사용자의 유효한 비밀번호.
      database:
        name: 데이터베이스
        description: 사용할 데이터베이스 이름. 기본값은 sigenergy.
      org:
        name: 조직
        description: InfluxDB v2 조직 이름 또는 ID. 지정하지 않으면 v1 API가 사용됩니다.
      token:
        name: 토큰
        description: InfluxDB v2 인증 토큰. 제공되면 v2 API가 우선적으로 사용됩니다.
      bucket:
        name: 버킷
        description: InfluxDB v2 버킷 이름. 지정하지 않으면 'database' 값이 v2 버킷 이름으로 사용됩니다.
      include:
        name: 포함
        description: InfluxDB에 게시할 때 포함할 센서 목록. 전체 또는 부분 엔티티 ID, 센서 클래스 이름 또는 정규 표현식을 사용합니다. 지정하지 않으면 모든 센서가 포함됩니다.
        fields:
          sensor:
            name: 센서
            description: InfluxDB에 게시할 때 포함할 센서.
      exclude:
        name: 제외
        description: InfluxDB에 게시할 때 제외할 센서 목록. 전체 또는 부분 엔티티 ID, 센서 클래스 이름 또는 정규 표현식을 사용합니다. 지정하지 않으면 제외되는 센서가 없습니다.
        fields:
          sensor:
            name: 센서
            description: InfluxDB에 게시할 때 제외할 센서.
