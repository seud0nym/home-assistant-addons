configuration:
  auto_discovery:
    name: Detección automática de dispositivos Sigenergy
    description: Configuración para detectar automáticamente sus dispositivos Sigenergy
    fields:
      force:
        name: Forzar detección automática
        description: Active esta opción para forzar la detección automática de hosts Modbus Sigenergy e IDs de dispositivo asociados.
      ping_timeout:
        name: Tiempo de espera de ping
        description: Tiempo de espera de ping en segundos para la detección automática. Por defecto 0,5 segundos.
      retries:
        name: Reintentos máximos
        description: Número máximo de reintentos para la detección automática. Por defecto 0.
      timeout:
        name: Tiempo de espera Modbus
        description: Tiempo de espera Modbus en segundos para la detección automática. Por defecto 0,25 segundos.
  manual_config:
    name: Configuración manual de dispositivo Sigenergy
    description: Configuración para especificar manualmente los detalles de conexión
    fields:
      host:
        name: Dirección del host
        description: Nombre de host o dirección IP del dispositivo Sigenergy. Deje en blanco para detección automática.
      port:
        name: Puerto Modbus
        description: Número de puerto Modbus del dispositivo Sigenergy.
      inverter_device_id:
        name: ID de dispositivo del inversor
        description: ID de dispositivo Modbus del inversor Sigenergy. Para múltiples inversores, use una lista separada por espacios.
      accharger_device_id:
        name: ID de dispositivo del cargador AC
        description: ID de dispositivo Modbus del cargador AC Sigenergy.
      dccharger_device_id:
        name: ID de dispositivo del cargador DC
        description: ID de dispositivo Modbus del cargador DC Sigenergy (normalmente igual al ID del inversor).
  scan_interval:
    name: Intervalos de escaneo de sensores
    description: Configuración de intervalos de escaneo para diferentes clases de sensores
    fields:
      low:
        name: Frecuencia baja
        description: Intervalo de escaneo en segundos para sensores de baja frecuencia. Por defecto 600, mínimo 1.
      medium:
        name: Frecuencia media
        description: Intervalo de escaneo en segundos para sensores de frecuencia media. Por defecto 60, mínimo 1.
      high:
        name: Frecuencia alta
        description: Intervalo de escaneo en segundos para sensores de alta frecuencia. Por defecto 10, mínimo 1.
      realtime:
        name: Casi tiempo real
        description: Intervalo de escaneo en segundos para sensores en tiempo real. Por defecto 5, mínimo 1.
  pvoutput:
    name: Integración PVOutput.org
    description: Configuración para integración con PVOutput.org
    fields:
      enabled:
        name: Habilitar carga
        description: Habilitar actualizaciones de estado a PVOutput.
      api_key:
        name: Clave API
        description: La clave API para PVOutput
      system_id:
        name: ID del sistema
        description: El ID del sistema PVOutput
      consumption:
        name: Habilitar cargas de consumo
        description: Enviar estado de consumo a PVOutput.
      exports:
        name: Habilitar cargas de exportación
        description: Enviar datos de exportación a PVOutput.
      imports:
        name: Habilitar cargas de importación
        description: Enviar datos de importación a PVOutput.
      eod_update:
        name: Habilitar carga de fin de día
        description: Enviar pico de generación y totales diarios al final del día.
      voltage:
        name: Fuente de voltaje
        description: Fuente del valor de voltaje para PVOutput. 'Phase A' para monofásico, 'Phase B/C' o 'Line to Line Average' para trifásico.
      ext_v7:
        name: Datos extendidos v7
        description: Una fuente utilizada para completar el campo extendido v7 en PVOutput. Puede especificar un nombre de clase de sensor, un ID de entidad sin el prefijo 'sensor.', un tema MQTT directo (o mqtt:<topic>), o un ID de entidad de sensor de Home Assistant (sensor.<id> o ha:sensor.<id>). Si no se especifica, O si su estado de donación no está actualizado, este campo no se enviará a PVOutput.
      ext_v8:
        name: Datos extendidos v8
        description: Una fuente utilizada para completar el campo extendido v8 en PVOutput. Puede especificar un nombre de clase de sensor, un ID de entidad sin el prefijo 'sensor.', un tema MQTT directo (o mqtt:<topic>), o un ID de entidad de sensor de Home Assistant (sensor.<id> o ha:sensor.<id>). Si no se especifica, O si su estado de donación no está actualizado, este campo no se enviará a PVOutput.
      ext_v9:
        name: Datos extendidos v9
        description: Una fuente utilizada para completar el campo extendido v9 en PVOutput. Puede especificar un nombre de clase de sensor, un ID de entidad sin el prefijo 'sensor.', un tema MQTT directo (o mqtt:<topic>), o un ID de entidad de sensor de Home Assistant (sensor.<id> o ha:sensor.<id>). Si no se especifica, O si su estado de donación no está actualizado, este campo no se enviará a PVOutput.
      ext_v10:
        name: Datos extendidos v10
        description: Una fuente utilizada para completar el campo extendido v10 en PVOutput. Puede especificar un nombre de clase de sensor, un ID de entidad sin el prefijo 'sensor.', un tema MQTT directo (o mqtt:<topic>), o un ID de entidad de sensor de Home Assistant (sensor.<id> o ha:sensor.<id>). Si no se especifica, O si su estado de donación no está actualizado, este campo no se enviará a PVOutput.
      ext_v11:
        name: Datos extendidos v11
        description: Una fuente utilizada para completar el campo extendido v11 en PVOutput. Puede especificar un nombre de clase de sensor, un ID de entidad sin el prefijo 'sensor.', un tema MQTT directo (o mqtt:<topic>), o un ID de entidad de sensor de Home Assistant (sensor.<id> o ha:sensor.<id>). Si no se especifica, O si su estado de donación no está actualizado, este campo no se enviará a PVOutput.
      ext_v12:
        name: Datos extendidos v12
        description: Una fuente utilizada para completar el campo extendido v12 en PVOutput. Puede especificar un nombre de clase de sensor, un ID de entidad sin el prefijo 'sensor.', un tema MQTT directo (o mqtt:<topic>), o un ID de entidad de sensor de Home Assistant (sensor.<id> o ha:sensor.<id>). Si no se especifica, O si su estado de donación no está actualizado, este campo no se enviará a PVOutput.
      temp_topic:
        name: Temperatura
        description: Una fuente para la temperatura actual enviada a PVOutput. Puede especificar un tema MQTT directo (o mqtt:<topic>), o un ID de entidad de sensor de Home Assistant (sensor.<id> o ha:sensor.<id>). Si no se especifica, la temperatura no se enviará a PVOutput.
  mqtt:
    name: Configuración MQTT
    description: Configuración para conectar a su broker MQTT
    fields:
      broker:
        name: Dirección del broker
        description: Nombre de host o dirección IP de su broker MQTT.
      port:
        name: Puerto MQTT
        description: Puerto de escucha del broker MQTT. Por defecto 1883, o 8883 con TLS.
      tls:
        name: Habilitar comunicación TLS
        description: Habilitar comunicación segura sobre TLS/SSL.
      username:
        name: Nombre de usuario
        description: Nombre de usuario para el broker MQTT.
      password:
        name: Contraseña
        description: Contraseña para el broker MQTT.
  advanced:
    name: Configuración avanzada
    description: Configuración avanzada para sigenergy2mqtt
    fields:
      clean:
        name: Limpiar mensajes MQTT retenidos
        description: Limpiar mensajes MQTT retenidos. **¡PRECAUCIÓN!** Los helpers de Home Assistant serán eliminados.
      consumption_method:
        name: Método de consumo
        description: Método de cálculo para 'Plant Consumed Power'. Por defecto 'Total Load' para V2.8.
      read_only:
        name: Habilitar solo lectura
        description: Solo leer datos, no escribir.
      no_remote_ems:
        name: Deshabilitar EMS remoto
        description: Ocultar sensores de lectura/escritura para EMS remoto.
      no_ems_mode_check:
        name: Deshabilitar verificaciones de EMS remoto
        description: Deshabilitar validación para límites ESS.
      edit_pct_box:
        name: Habilitar editor de caja de porcentaje
        description: Usar cuadro de entrada numérico en lugar de deslizador para sensores de porcentaje.
      sigenergy_local_modbus_naming:
        name: Nomenclatura Sigenergy-Local-Modbus
        description: Activar para usar la convención de nomenclatura de entidades TypQxQ/Sigenergy-Local-Modbus para los sensores. (También deberías activar la limpieza de mensajes MQTT al cambiar esta opción, de lo contrario los nuevos nombres de entidad serán ignorados por Home Assistant.)
      metrics_enabled:
        name: Habilitar métricas
        description: Publicar métricas de sigenergy2mqtt.
      sanity_check_default_kw:
        name: kW predeterminado para verificación
        description: Valor predeterminado en kW para verificaciones. Por defecto 500 kW.
      language:
        name: Idioma
        description: El idioma que se utilizará para sigenergy2mqtt. El valor predeterminado es el definido en Ajustes → Sistema → Idioma, o si ese idioma no es compatible, el valor predeterminado es inglés.
      envvars:
        name: Variables de entorno
        description: Permite configurar variables de entorno avanzadas para el servicio sigenergy2mqtt. La lista completa de variables de entorno disponibles se encuentra en https://github.com/seud0nym/sigenergy2mqtt/blob/main/resources/configuration/ENV.md#environment-variables
        fields:
          name:
            name: Nombre
            description: El nombre de la variable de entorno.
          value:
            name: Valor
            description: El valor de la variable de entorno.
  logging:
    name: Configuración de registro
    description: Configuración de niveles de registro
    fields:
      sigenergy2mqtt:
        name: sigenergy2mqtt
        description: Establecer nivel de registro de sigenergy2mqtt.
      debug_sensor:
        name: Sensor a depurar
        description: Especificar sensor para depurar.
      app:
        name: Script de ejecución del app
        description: Nivel de registro del script del app.
      modbus:
        name: Modbus
        description: Nivel de registro de pymodbus.
      pvoutput:
        name: PVOutput
        description: Nivel de registro de PVOutput.
      mqtt:
        name: MQTT
        description: Nivel de registro de paho.mqtt.
      influxdb:
        name: InfluxDB
        description: Nivel de registro de InfluxDB.
  influxdb:
    name: Configuración de InfluxDB
    description: Configuración para escribir datos de sensores en su base de datos InfluxDB. (Esto es diferente a la integración de Home Assistant con InfluxDB, que solo publica sensores habilitados y no publica datos repetidos.)
    fields:
      enabled:
        name: Habilitar InfluxDB
        description: Habilitar la publicación de datos de sensores en InfluxDB.
      host:
        name: Servidor
        description: Nombre de host o dirección IP de su base de datos InfluxDB. Por defecto es 'a0d7b954-influxdb' (nombre de host del app InfluxDB de Home Assistant).
      port:
        name: Puerto
        description: Puerto de escucha de la base de datos InfluxDB. Por defecto es 8086.
      username:
        name: Nombre de usuario
        description: Nombre de usuario válido para la base de datos InfluxDB.
      password:
        name: Contraseña
        description: Contraseña válida para el usuario de la base de datos InfluxDB.
      database:
        name: Base de datos
        description: Nombre de la base de datos a usar. Por defecto es sigenergy.
      org:
        name: Organización
        description: Nombre o ID de organización de InfluxDB v2. Si no se especifica, se usará la API v1.
      token:
        name: Ficha de acceso
        description: Token de autenticación de InfluxDB v2. Si se proporciona, se usarán las APIs v2 preferentemente.
      bucket:
        name: Depósito
        description: Nombre del bucket de InfluxDB v2. Si no se especifica, se usará el valor de 'base de datos' como nombre del bucket v2.
      include:
        name: Incluir
        description: Lista de sensores a incluir al publicar en InfluxDB, usando el ID de entidad completo o parcial, el nombre de clase del sensor o una expresión regular. Si no se especifica, se incluirán todos los sensores.
        fields:
          sensor:
            name: Medidor
            description: El sensor a incluir al publicar en InfluxDB.
      exclude:
        name: Excluir
        description: Lista de sensores a excluir al publicar en InfluxDB, usando el ID de entidad completo o parcial, el nombre de clase del sensor o una expresión regular. Si no se especifica, no se excluirá ningún sensor.
        fields:
          sensor:
            name: Medidor
            description: El sensor a excluir al publicar en InfluxDB.
